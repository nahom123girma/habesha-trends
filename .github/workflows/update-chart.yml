name: Update chart data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run updater
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
        run: node update-chart.mjs

      - name: Commit updated data
        run: |
          git config user.name  "habesha-bot"
          git config user.email "bot@habeshatrends.com"
          git add data.json SONGS.snippet.js
          if git diff --staged --quiet; then
            echo "No data changes - nothing to commit."
          else
            git commit -m "Update chart data"
            git push
          fi
